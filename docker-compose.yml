version: "3.9"

services:
  backend:
    image: python:3.12-slim
    working_dir: /app/backend
    volumes:
      - .:/app
    command: python -m leadbot
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    volumes:
      - .:/app
    command: sh -c "npm install && npm run dev"
    ports:
      - "3000:3000"
